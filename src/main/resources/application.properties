# Application Name
spring.application.name=CollabSpace

# Server Port
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:collabspace_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=your256bitsecretkeyheremustbeatleast32characterslong
jwt.expiration=3600000
jwt.refreshExpiration=604800000

# WebSocket Configuration
spring.websocket.message-size-limit=65536
spring.websocket.buffer-size-limit=524288

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.collabspace=DEBUG
