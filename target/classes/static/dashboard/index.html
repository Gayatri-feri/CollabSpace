<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabChat - Team Collaboration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <span class="logo-text">CollabChat</span>
            </div>
        </div>
        
        <div class="nav-center">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="chat">
                    <i class="fas fa-comment-dots"></i>
                    <span>Chat</span>
                </button>
                <button class="nav-tab" data-tab="video">
                    <i class="fas fa-video"></i>
                    <span>Video</span>
                </button>
                <button class="nav-tab" data-tab="groups">
                    <i class="fas fa-users"></i>
                    <span>Groups</span>
                </button>
            </div>
        </div>
        
        <div class="nav-right">
            <button class="nav-btn notification-btn">
                <i class="fas fa-bell"></i>
                <span class="notification-badge">3</span>
            </button>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Rahul+Sharma&background=6366f1&color=fff" alt="Profile" class="profile-avatar">
                <div class="profile-dropdown">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard Container -->
    <div class="dashboard-container">
        <!-- LEFT SIDEBAR (25%) -->
        <aside class="left-sidebar">
            <!-- Active Users Section -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Active Users</h3>
                    <span class="online-count">5 online</span>
                </div>
                <div class="active-users-scroll">
                    <div class="active-user" title="Rahul Sharma">
                        <div class="active-user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Rahul+Sharma&background=6366f1&color=fff" alt="Rahul">
                            <span class="online-dot"></span>
                        </div>
                    </div>
                    <div class="active-user" title="Anjali Patel">
                        <div class="active-user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Anjali+Patel&background=10b981&color=fff" alt="Anjali">
                            <span class="online-dot"></span>
                        </div>
                    </div>
                    <div class="active-user" title="Vikram Singh">
                        <div class="active-user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Vikram+Singh&background=f59e0b&color=fff" alt="Vikram">
                            <span class="online-dot"></span>
                        </div>
                    </div>
                    <div class="active-user" title="Priya Gupta">
                        <div class="active-user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Priya+Gupta&background=ec4899&color=fff" alt="Priya">
                            <span class="online-dot"></span>
                        </div>
                    </div>
                    <div class="active-user" title="Arjun Kumar">
                        <div class="active-user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Arjun+Kumar&background=8b5cf6&color=fff" alt="Arjun">
                            <span class="online-dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search or start new chat">
            </div>

            <!-- Chat List -->
            <div class="chat-list-container">
                <div class="chat-list-header">
                    <h4>Recent Chats</h4>
                </div>
                <div class="chat-list" id="chat-list">
                    <!-- Chat items will be rendered dynamically -->
                </div>
            </div>
        </aside>

        <!-- CENTER CHAT PANEL (50%) -->
        <main class="chat-panel">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-user-avatar">
                        <img id="header-avatar" src="" alt="">
                        <span class="header-online-dot"></span>
                    </div>
                    <div class="chat-user-info">
                        <h3 id="header-name">Select a chat</h3>
                        <p id="header-status" class="status-text">Online</p>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="header-btn" title="Voice Call">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="header-btn" title="Video Call">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="header-btn" title="More Options">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messages-container">
                <div class="messages-scroll" id="messages-scroll">
                    <!-- Messages will be rendered dynamically -->
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator-container" id="typing-indicator">
                <div class="typing-indicator">
                    <span class="typing-text">Rahul is typing</span>
                    <span class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </div>
            </div>

            <!-- Message Input Area -->
            <div class="message-input-area">
                <button class="input-btn emoji-btn" title="Emoji">
                    <i class="far fa-smile"></i>
                </button>
                <button class="input-btn attach-btn" title="Attach">
                    <i class="fas fa-paperclip"></i>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Type a message...">
                </div>
                <button class="send-btn" id="send-btn" title="Send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>

        <!-- RIGHT PANEL (25%) -->
        <aside class="right-panel" id="right-panel">
            <div class="contact-info">
                <!-- Profile Section -->
                <div class="profile-section">
                    <div class="profile-large">
                        <img id="contact-avatar" src="https://ui-avatars.com/api/?name=Anjali+Patel&background=10b981&color=fff&size=200" alt="Contact">
                        <span class="profile-online-badge"></span>
                    </div>
                    <h3 id="contact-name">Anjali Patel</h3>
                    <p id="contact-status" class="contact-status-text">Online</p>
                </div>

                <!-- About Section -->
                <div="info-section">
                    <h4>About</h4>
                    <p id="contact-about">Senior Backend Developer working on Spring Boot microservices. Passionate about clean code and real-time systems.</p>
                </div>

                <!-- Media Section -->
                <div class="info-section">
                    <h4>Media, Links and Docs</h4>
                    <div class="media-grid">
                        <div class="media-item">
                            <img src="https://via.placeholder.com/80/6366f1/ffffff?text=API" alt="Media 1">
                        </div>
                        <div class="media-item">
                            <img src="https://via.placeholder.com/80/10b981/ffffff?text=DB" alt="Media 2">
                        </div>
                        <div class="media-item">
                            <img src="https://via.placeholder.com/80/f59e0b/ffffff?text=UI" alt="Media 3">
                        </div>
                        <div class="media-item">
                            <img src="https://via.placeholder.com/80/ec4899/ffffff?text=WS" alt="Media 4">
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="action-btn block-btn">
                        <i class="fas fa-ban"></i>
                        <span>Block Anjali</span>
                    </button>
                    <button class="action-btn report-btn">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>Report Anjali</span>
                    </button>
                    <button class="action-btn delete-btn">
                        <i class="fas fa-trash-alt"></i>
                        <span>Delete Chat</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
