<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabSpace - Real-Time Chat</title>
    <!-- SockJS and STOMP for WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <!-- Login Section -->
    <div id="login-section" class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-comments"></i>
                <h1>CollabSpace</h1>
            </div>
            <p class="subtitle">Real-Time Team Collaboration</p>
            
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="register-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="register-role" required>
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>

            <div id="auth-error" class="error-message"></div>
        </div>
    </div>

    <!-- Chat Application -->
    <div id="chat-section" class="chat-container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <img id="current-user-avatar" src="" alt="Avatar" class="avatar">
                    <div class="user-info">
                        <span id="current-user-name" class="user-name"></span>
                        <span class="user-status">
                            <span class="status-dot online"></span> Online
                        </span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

            <!-- Search -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="user-search" placeholder="Search users...">
            </div>

            <!-- Online Users Section -->
            <div class="section-header">
                <span>Online Users</span>
                <span id="online-count" class="badge">0</span>
            </div>
            <ul id="online-users-list" class="users-list">
                <!-- Online users will be populated here -->
            </ul>

            <!-- Chat Rooms Section -->
            <div class="section-header">
                <span>Chat Rooms</span>
                <button class="create-room-btn" onclick="showCreateRoomModal()" title="Create Room">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <ul id="chat-rooms-list" class="rooms-list">
                <!-- Chat rooms will be populated here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="chat-header-info">
                    <img id="chat-avatar" src="" alt="" class="avatar">
                    <div class="chat-header-text">
                        <h3 id="chat-title">Select a chat</h3>
                        <p id="chat-status" class="status-text"></p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="action-btn" title="Voice Call">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="action-btn" title="Video Call">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="action-btn" title="More Options">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="messages-container" class="messages-container">
                <div id="welcome-message" class="welcome-message">
                    <i class="fas fa-comments"></i>
                    <h2>Welcome to CollabSpace</h2>
                    <p>Select a user or room to start chatting</p>
                </div>
                <div id="messages-list" class="messages-list hidden">
                    <!-- Messages will be populated here -->
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typing-indicator" class="typing-indicator hidden">
                <span class="typing-text"></span>
                <span class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </div>

            <!-- Message Input -->
            <div class="message-input-container">
                <button class="attach-btn" title="Attach File">
                    <i class="fas fa-paperclip"></i>
                </button>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Type a message..." 
                        autocomplete="off"
                        disabled
                    >
                    <button class="emoji-btn" title="Emoji">
                        <i class="far fa-smile"></i>
                    </button>
                </div>
                <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Create Room Modal -->
    <div id="create-room-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Room</h3>
                <button class="close-btn" onclick="hideCreateRoomModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Room Name</label>
                    <input type="text" id="room-name" placeholder="Enter room name">
                </div>
                <div class="input-group">
                    <label>Description (Optional)</label>
                    <textarea id="room-description" placeholder="Enter room description"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="hideCreateRoomModal()">Cancel</button>
                <button class="btn-primary" onclick="createRoom()">Create Room</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="chat.js"></script>
</body>
</html>
